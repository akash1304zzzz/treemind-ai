name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build Remind AI APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web assets
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor to Android
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: remind-ai-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Create Release (on main branch push)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-${{ github.run_number }}
          name: "Remind AI v0.1.0 (Build #${{ github.run_number }})"
          body: |
            ## Remind AI - Android APK

            📱 **Download the APK below** and install it on your Android phone.

            > ⚠️ You may need to enable "Install from unknown sources" in your phone's settings.

            ### How to use:
            1. Download `app-debug.apk` from the Assets section below
            2. Open the file on your phone to install
            3. Launch "Remind AI"
            4. Go to **Settings** and set your **Server URL** to your PC's local IP (e.g. `http://192.168.1.100:5000`)
            5. Enter your password (default: `remindai123`)
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
